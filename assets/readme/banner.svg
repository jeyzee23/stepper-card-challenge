<svg width="1280" height="280" viewBox="0 0 1280 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070B14"/>
      <stop offset="100%" style="stop-color:#0F1829"/>
    </linearGradient>
    <linearGradient id="orangeGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E87722;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#E87722;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#E87722;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E87722;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#E87722;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#E87722;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E87722;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#E87722;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#E87722;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A2540" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="280" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <rect width="1280" height="280" fill="url(#grid)" opacity="0.6"/>

  <!-- Center glow -->
  <ellipse cx="640" cy="140" rx="500" ry="160" fill="url(#centerGlow)" filter="url(#blur)"/>

  <!-- Orange horizontal band (glow) -->
  <rect x="0" y="130" width="1280" height="20" fill="url(#orangeGlow)" filter="url(#softBlur)"/>

  <!-- Top border line -->
  <rect x="0" y="0" width="1280" height="1" fill="url(#lineGrad)" opacity="0.4"/>
  <!-- Bottom border line -->
  <rect x="0" y="279" width="1280" height="1" fill="url(#lineGrad)" opacity="0.4"/>

  <!-- Decorative left bracket -->
  <path d="M 120 80 L 80 80 L 80 200 L 120 200" stroke="#E87722" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Decorative right bracket -->
  <path d="M 1160 80 L 1200 80 L 1200 200 L 1160 200" stroke="#E87722" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Main title -->
  <text x="640" y="118" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">Galicia Card Stepper</text>

  <!-- Subtitle -->
  <text x="640" y="155" font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#6B7FA3" text-anchor="middle" letter-spacing="0.5">React Native CLI · Challenge técnico · i18n ES | EN</text>

  <!-- Stepper visualization -->
  <!-- Line connecting dots -->
  <line x1="480" y1="205" x2="800" y2="205" stroke="#1A2D5A" stroke-width="2"/>
  <!-- Completed segment 1 -->
  <line x1="480" y1="205" x2="586" y2="205" stroke="#E87722" stroke-width="2"/>
  <!-- Completed segment 2 -->
  <line x1="586" y1="205" x2="694" y2="205" stroke="#E87722" stroke-width="2"/>

  <!-- Step 1 — completed -->
  <circle cx="480" cy="205" r="14" fill="#E87722"/>
  <text x="480" y="210" font-family="'SF Pro Text', Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="480" y="230" font-family="'SF Pro Text', Arial, sans-serif" font-size="10" fill="#6B7FA3" text-anchor="middle">Perfil</text>

  <!-- Step 2 — completed -->
  <circle cx="586" cy="205" r="14" fill="#E87722"/>
  <text x="586" y="210" font-family="'SF Pro Text', Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="586" y="230" font-family="'SF Pro Text', Arial, sans-serif" font-size="10" fill="#6B7FA3" text-anchor="middle">Seguridad</text>

  <!-- Step 3 — current -->
  <circle cx="694" cy="205" r="14" fill="#0F1829" stroke="#E87722" stroke-width="2"/>
  <circle cx="694" cy="205" r="6" fill="#E87722"/>
  <text x="694" y="230" font-family="'SF Pro Text', Arial, sans-serif" font-size="10" fill="#E87722" text-anchor="middle">Controles</text>

  <!-- Step 4 — pending -->
  <circle cx="800" cy="205" r="14" fill="#0F1829" stroke="#1A2D5A" stroke-width="2"/>
  <text x="800" y="210" font-family="'SF Pro Text', Arial, sans-serif" font-size="12" fill="#6B7FA3" text-anchor="middle">4</text>
  <text x="800" y="230" font-family="'SF Pro Text', Arial, sans-serif" font-size="10" fill="#6B7FA3" text-anchor="middle">Estados</text>

  <!-- State badges (right side, decorative) -->
  <!-- disabled badge -->
  <rect x="920" y="172" width="72" height="22" rx="4" fill="#1A2540" stroke="#2A3D66" stroke-width="1"/>
  <circle cx="934" cy="183" r="4" fill="#6B7FA3"/>
  <text x="942" y="187" font-family="'SF Pro Text', Arial, sans-serif" font-size="10" fill="#6B7FA3">disabled</text>

  <!-- enabled badge -->
  <rect x="1002" y="172" width="64" height="22" rx="4" fill="#0D2016" stroke="#1A4029" stroke-width="1"/>
  <circle cx="1016" cy="183" r="4" fill="#34C759"/>
  <text x="1024" y="187" font-family="'SF Pro Text', Arial, sans-serif" font-size="10" fill="#34C759">enabled</text>

  <!-- paused badge -->
  <rect x="920" y="202" width="60" height="22" rx="4" fill="#1F1A0D" stroke="#3D3010" stroke-width="1"/>
  <circle cx="934" cy="213" r="4" fill="#E87722"/>
  <text x="942" y="217" font-family="'SF Pro Text', Arial, sans-serif" font-size="10" fill="#E87722">paused</text>

  <!-- resumed badge -->
  <rect x="990" y="202" width="76" height="22" rx="4" fill="#0D1A2F" stroke="#1A3050" stroke-width="1"/>
  <circle cx="1004" cy="213" r="4" fill="#0A84FF"/>
  <text x="1012" y="217" font-family="'SF Pro Text', Arial, sans-serif" font-size="10" fill="#0A84FF">resumed</text>

  <!-- Corner accent dots -->
  <circle cx="20" cy="20" r="2" fill="#E87722" opacity="0.4"/>
  <circle cx="30" cy="20" r="2" fill="#E87722" opacity="0.2"/>
  <circle cx="20" cy="30" r="2" fill="#E87722" opacity="0.2"/>

  <circle cx="1260" cy="20" r="2" fill="#E87722" opacity="0.4"/>
  <circle cx="1250" cy="20" r="2" fill="#E87722" opacity="0.2"/>
  <circle cx="1260" cy="30" r="2" fill="#E87722" opacity="0.2"/>

  <circle cx="20" cy="260" r="2" fill="#E87722" opacity="0.4"/>
  <circle cx="30" cy="260" r="2" fill="#E87722" opacity="0.2"/>
  <circle cx="20" cy="250" r="2" fill="#E87722" opacity="0.2"/>

  <circle cx="1260" cy="260" r="2" fill="#E87722" opacity="0.4"/>
  <circle cx="1250" cy="260" r="2" fill="#E87722" opacity="0.2"/>
  <circle cx="1260" cy="250" r="2" fill="#E87722" opacity="0.2"/>
</svg>
