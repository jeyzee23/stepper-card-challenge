name: PR title

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  conventional-title:
    name: Conventional PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ ! "$PR_TITLE" =~ ^(feat|fix|refactor|test|chore|docs):[[:space:]].+ ]]; then
            echo "PR title must follow Conventional Commits, e.g. 'test: add quality gates'."
            echo "Received: $PR_TITLE"
            exit 1
          fi
